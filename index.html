<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <!--
        viewport: width=device-width verhindert Browser-Zoom-Bugs.
        viewport-fit=cover füllt auch den Notch-Bereich auf iPhones aus.
        user-scalable=no deaktiviert Pinch-Zoom damit kein unbeabsichtigter
        Zoom das Spiel stört.
    -->
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0,
                   minimum-scale=1.0, maximum-scale=1.0,
                   user-scalable=no, viewport-fit=cover">

    <!-- Als App auf dem Homescreen speicherbar (iOS / Android) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0d0d1a">

    <title>MELON MADNESS 67</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Passwort-Screen – blockiert Zugang bis Passwort korrekt -->
    <div id="passwordScreen">
        <div id="passwordBox">
            <div id="pwMelon">&#127813;</div>
            <div id="pwTitle">MELON MADNESS 67</div>
            <div id="pwSubtitle">&#9733; PRIVATE EDITION &#9733;</div>
            <div id="pwLabel">ZUGANG NUR MIT PASSWORT</div>
            <input id="pwInput" type="password" placeholder="Passwort eingeben..." autocomplete="off" spellcheck="false" />
            <button id="pwBtn">EINTRETEN</button>
            <div id="pwError"></div>
        </div>
    </div>

    <!-- Spielcontainer – wird von JS zentriert & skaliert -->
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
    </div>

    <!--
        Portrait-Hinweis: Wird per CSS nur auf schmalen Hochformat-Screens
        eingeblendet (Handys < 600 px Breite im Hochformat).
        Überlagert das Spiel vollflächig.
    -->
    <div id="rotateMsg" aria-live="polite">
        <div class="rotate-icon">&#128260;</div>
        <p class="rotate-title">Gerät drehen</p>
        <p class="rotate-sub">Das Spiel läuft im <strong>Querformat</strong></p>
        <p class="rotate-sub">Please rotate to <strong>landscape</strong></p>
    </div>

    <script>
    (function() {
        var KEY = 'mm67_auth_v1';
        var HASH = '6461766930363031'; // hex von "davi0601"

        function strToHex(s) {
            var r = '';
            for (var i = 0; i < s.length; i++) r += s.charCodeAt(i).toString(16);
            return r;
        }

        function unlock() {
            sessionStorage.setItem(KEY, HASH);
            document.getElementById('passwordScreen').style.display = 'none';
        }

        // Bereits authentifiziert in dieser Sitzung?
        if (sessionStorage.getItem(KEY) === HASH) {
            document.getElementById('passwordScreen').style.display = 'none';
            return;
        }

        // Passwort-Prüfung
        function attempt() {
            var val = document.getElementById('pwInput').value;
            if (strToHex(val) === HASH) {
                unlock();
            } else {
                var err = document.getElementById('pwError');
                err.textContent = 'FALSCHES PASSWORT!';
                document.getElementById('pwInput').value = '';
                document.getElementById('pwInput').classList.add('pw-shake');
                setTimeout(function() {
                    document.getElementById('pwInput').classList.remove('pw-shake');
                    err.textContent = '';
                }, 1200);
            }
        }

        document.getElementById('pwBtn').addEventListener('click', attempt);
        document.getElementById('pwInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') attempt();
        });
        // Fokus auf Eingabefeld setzen
        setTimeout(function() { document.getElementById('pwInput').focus(); }, 100);
    })();
    </script>

    <script src="script.js?v=5"></script>
</body>
</html>
